# H2 In-Memory (Active configuration)
spring.datasource.url=jdbc:h2:mem:innerrootdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect


# Hibernate will **not** create/alter tables itself when Flyway is in use.
# ddl-auto options: validate/check when using migrations, update/create for dev only
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT Configuration ----
app.jwt.secret=${JWT_SECRET:8Zz5tw0Ionm3XPZZfN0FkzAt63sWpC0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# ---- Google OAuth ----
app.google.client-id=${GOOGLE_CLIENT_ID:}


# CORS (Allow local dev, tunnel, and Vercel production)
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,https://inner-root.vercel.app}

# Logging
logging.level.com.innerroot=DEBUG
logging.level.org.springframework.security=DEBUG

# H2 Console (local dev only)
spring.h2.console.enabled=true

# Flyway — disabled for local H2 dev. Enable via env var in production.
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true

