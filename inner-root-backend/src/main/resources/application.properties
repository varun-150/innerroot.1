server.port=${PORT:8080}

# --- Database Configuration (PostgreSQL) ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT Configuration ----
app.jwt.secret=${JWT_SECRET:8Zz5tw0Ionm3XPZZfN0FkzAt63sWpC0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S0S}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# ---- Google OAuth ----
app.google.client-id=${GOOGLE_CLIENT_ID:}

# CORS configuration
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,https://inner-root.vercel.app}

# Logging
logging.level.com.innerroot=DEBUG
logging.level.org.springframework.security=DEBUG

# Flyway configuration
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true

# ---- AI API (OpenRouter) ----
ai.api.key=${AI_API_KEY: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}
ai.api.url=${AI_API_URL:https://openrouter.ai/api/v1/chat/completions}
ai.api.model=${AI_API_MODEL:google/gemini-2.0-flash-lite-001}

# ---- Webhook (n8n/Automations) ----
