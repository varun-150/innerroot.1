services:
  # --- React Frontend ---
  - type: web
    name: inner-root-frontend
    runtime: static
    rootDir: react-project
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_OTP_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # --- Spring Boot Backend ---
  - type: web
    name: inner-root-backend
    runtime: java
    plan: free
    rootDir: inner-root-backend
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -Xmx384m -Dserver.port=$PORT -jar target/*.jar
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: inner-root-db
          property: jdbcConnectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: inner-root-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: inner-root-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_API_URL
        value: "https://openrouter.ai/api/v1/chat/completions"
      - key: AI_API_MODEL
        value: "google/gemini-2.0-flash-lite-001"
      - key: ALLOWED_ORIGINS
        sync: false

  # --- Node.js OTP Service ---
  - type: web
    name: otp-service
    runtime: node
    plan: free
    rootDir: otp-service
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: inner-root-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: "1h"
      - key: SMS_PROVIDER
        value: "resend"
      - key: RESEND_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: inner-root-db
    plan: free
    databaseName: innerrootdb
    user: innerroot
