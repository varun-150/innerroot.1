services:
  # Frontend
  - type: static
    name: inner-root-frontend
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_OTP_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend
  - type: web
    name: inner-root-backend
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: inner-root-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: inner-root-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: inner-root-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: inner-root-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: inner-root-db
          property: databaseName
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: inner-root-db
    plan: free
    databaseName: innerrootdb
    user: innerroot
