services:
  # --- React Frontend ---
  - type: web
    name: inner-root-frontend
    runtime: static
    rootDir: react-project
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_OTP_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # --- Spring Boot Backend ---
  - type: web
    name: inner-root-backend
    runtime: docker
    plan: free
    rootDir: inner-root-backend
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: inner-root-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: inner-root-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: inner-root-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: inner-root-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: inner-root-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_API_URL
        value: "https://openrouter.ai/api/v1/chat/completions"
      - key: AI_API_MODEL
        value: "google/gemini-2.0-flash-lite-001"
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: inner-root-db
    plan: free
    databaseName: innerrootdb
    user: innerroot
