name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: 🎨 Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-project
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: react-project/package-lock.json
      - run: npm ci
      - run: npm run lint || true
      - run: npm run build
        env:
          VITE_API_URL: https://placeholder.api.com/api
          VITE_OTP_URL: https://placeholder.otp.com

  otp-service:
    name: 🔐 OTP Service (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: otp-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: otp-service/package-lock.json
      - run: npm ci
      - run: npm test

  backend:
    name: ⚙️ Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inner-root-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - run: chmod +x mvnw
      - run: ./mvnw verify -DskipTests
